syntax = "proto3";

package dal_obscura.flight.v1;

option java_package = "io.dalobscura.flight.v1";
option java_outer_classname = "DalObscuraFlightProto";

message PlanRequest {
  uint32 protocol_version = 1;
  string catalog = 2;
  string target = 3;
  repeated string columns = 4;
  string row_filter = 5;
}
