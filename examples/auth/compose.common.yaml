services:
  # Builds the disposable catalog and publishes the example control-plane state.
  setup:
    build:
      context: ../..
      dockerfile: examples/auth/_shared/Dockerfile
    environment:
      EXAMPLE_ROOT: /workspace/example
    volumes:
      - runtime:/workspace/runtime
    command: ["sh", "examples/auth/_shared/scripts/setup_runtime.sh"]
    healthcheck:
      test: ["CMD", "test", "-f", "/workspace/runtime/setup.done"]
      interval: 1s
      timeout: 3s
      retries: 60

  # Runs the real Flight data plane from the published runtime volume.
  dal-obscura:
    build:
      context: ../..
      dockerfile: Dockerfile
    entrypoint: []
    depends_on:
      setup:
        condition: service_healthy
    volumes:
      - runtime:/workspace/runtime
      - ./_shared/scripts:/workspace/examples/auth/_shared/scripts:ro
    command: ["sh", "examples/auth/_shared/scripts/start_data_plane.sh"]

  # Keeps a ready client container available for interactive example reads.
  client:
    build:
      context: ../..
      dockerfile: examples/auth/_shared/Dockerfile
    depends_on:
      dal-obscura:
        condition: service_started
    volumes:
      - runtime:/workspace/runtime
    command: ["sh", "examples/auth/_shared/scripts/run_client_session.sh"]
    healthcheck:
      test: ["CMD", "test", "-f", "/workspace/runtime/client.ready"]
      interval: 1s
      timeout: 3s
      retries: 60
