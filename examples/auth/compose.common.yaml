services:
  setup:
    build:
      context: ../..
      dockerfile: examples/auth/_shared/Dockerfile
    environment:
      EXAMPLE_ROOT: /workspace/example
    volumes:
      - runtime:/workspace/runtime
    command:
      - sh
      - -c
      - |
        set -e
        rm -f /workspace/runtime/setup.done
        /workspace/.venv/bin/python examples/auth/_shared/scripts/build_runtime.py
        touch /workspace/runtime/setup.done
        tail -f /dev/null
    healthcheck:
      test: ["CMD", "test", "-f", "/workspace/runtime/setup.done"]
      interval: 1s
      timeout: 3s
      retries: 60

  dal-obscura:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      setup:
        condition: service_healthy
    volumes:
      - runtime:/workspace/runtime
    command:
      - sh
      - -c
      - |
        set -e
        . /workspace/runtime/data-plane.env
        /workspace/.venv/bin/dal-obscura

  client:
    build:
      context: ../..
      dockerfile: examples/auth/_shared/Dockerfile
    depends_on:
      dal-obscura:
        condition: service_started
    volumes:
      - runtime:/workspace/runtime
    command:
      - sh
      - -c
      - |
        set -e
        . /workspace/runtime/data-plane.env
        /workspace/.venv/bin/python examples/auth/_shared/scripts/client_session.py
    healthcheck:
      test: ["CMD", "test", "-f", "/workspace/runtime/client.ready"]
      interval: 1s
      timeout: 3s
      retries: 60
