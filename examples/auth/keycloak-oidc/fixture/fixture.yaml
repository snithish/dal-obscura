catalog: example_catalog
tables:
  - target: default.users
    schema:
      - name: id
        type: long
        required: true
      - name: email
        type: string
      - name: region
        type: string
    rows:
      - id: 1
        email: alice@example.com
        region: us
      - id: 2
        email: bob@example.com
        region: eu
      - id: 3
        email: carol@example.com
        region: us
policies:
  - target: default.users
    rules:
      - principals: ["example-user"]
        columns: ["id", "email", "region"]
        row_filter: "region = 'us'"
