name: dal-obscura-auth-composite-provider
services:
  setup:
    extends:
      file: ../compose.common.yaml
      service: setup
    environment:
      AUTH_FLOW: composite-provider
    volumes:
      - .:/workspace/example:ro
  dal-obscura:
    extends:
      file: ../compose.common.yaml
      service: dal-obscura
    environment:
      DAL_OBSCURA_TICKET_SECRET: ticket-secret-32-characters-long
      DAL_OBSCURA_JWT_SECRET: jwt-secret-at-least-32-characters-long
      DAL_OBSCURA_API_KEY: example-api-key
  client:
    extends:
      file: ../compose.common.yaml
      service: client
    environment:
      AUTH_FLOW: composite-provider
      FLIGHT_URI: grpc+tcp://dal-obscura:8815
      DAL_OBSCURA_JWT_SECRET: jwt-secret-at-least-32-characters-long
      DAL_OBSCURA_API_KEY: example-api-key
      STARTUP_CREDENTIALS: api-key,jwt
      STARTUP_EXPECT_ROWS: "2"
volumes:
  runtime:
