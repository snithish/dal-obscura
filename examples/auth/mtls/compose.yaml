name: dal-obscura-auth-mtls
services:
  # Generates local demo certificates before the shared runtime fixture is published.
  setup:
    extends:
      file: ../compose.common.yaml
      service: setup
    environment:
      AUTH_FLOW: mtls
    volumes:
      - .:/workspace/example:ro
    command:
      - sh
      - examples/auth/_shared/scripts/setup_runtime.sh
      - /workspace/example/scripts/generate_certs.py
  dal-obscura:
    extends:
      file: ../compose.common.yaml
      service: dal-obscura
    environment:
      DAL_OBSCURA_TICKET_SECRET: ticket-secret-32-characters-long
      DAL_OBSCURA_TLS_CERT_FILE: /workspace/runtime/certs/server.crt
      DAL_OBSCURA_TLS_KEY_FILE: /workspace/runtime/certs/server.key
      DAL_OBSCURA_TLS_CLIENT_CA_FILE: /workspace/runtime/certs/ca.crt
      DAL_OBSCURA_TLS_VERIFY_CLIENT: "true"
  client:
    extends:
      file: ../compose.common.yaml
      service: client
    environment:
      AUTH_FLOW: mtls
      FLIGHT_URI: grpc+tls://dal-obscura:8815
      CLIENT_CERT_DIR: /workspace/runtime/certs
      STARTUP_EXPECT_ROWS: "2"
volumes:
  runtime:
