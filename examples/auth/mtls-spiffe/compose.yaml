include:
  - compose.spire.yaml

name: dal-obscura-auth-mtls-spiffe
services:
  setup:
    extends:
      file: ../compose.common.yaml
      service: setup
    environment:
      AUTH_FLOW: mtls-spiffe
    volumes:
      - .:/workspace/example:ro

  dal-obscura:
    extends:
      file: ../compose.common.yaml
      service: dal-obscura
    depends_on:
      setup:
        condition: service_healthy
      server-svid:
        condition: service_healthy
    environment:
      DAL_OBSCURA_TICKET_SECRET: ticket-secret-32-characters-long
      DAL_OBSCURA_TLS_CERT_FILE: /workspace/server-svid/svid.0.pem
      DAL_OBSCURA_TLS_KEY_FILE: /workspace/server-svid/svid.0.key
      DAL_OBSCURA_TLS_CLIENT_CA_FILE: /workspace/server-svid/bundle.0.pem
      DAL_OBSCURA_TLS_VERIFY_CLIENT: "true"
    user: "1001:1001"
    volumes:
      - server-svid:/workspace/server-svid:ro

  client:
    extends:
      file: ../compose.common.yaml
      service: client
    depends_on:
      dal-obscura:
        condition: service_started
      client-svid:
        condition: service_healthy
    environment:
      AUTH_FLOW: mtls-spiffe
      FLIGHT_URI: grpc+tls://dal-obscura:8815
      SPIFFE_SVID_DIR: /workspace/client-svid
      STARTUP_EXPECT_ROWS: "2"
    volumes:
      - client-svid:/workspace/client-svid:ro

volumes:
  runtime:
